        // Referencias a elementos del DOM
        const homeView = document.getElementById('homeView');
        const categoryView = document.getElementById('categoryView');
        const categoriesGrid = document.getElementById('categoriesGrid');
        const backButton = document.getElementById('backButton');
        const categoryTitle = document.getElementById('categoryTitle');
        const categorySubtitle = document.getElementById('categorySubtitle');
        const itemsList = document.getElementById('itemsList');

        // Función para renderizar las categorías
        function renderCategories() {
            categoriesGrid.innerHTML = '';
            
            Object.keys(menuData).forEach(categoryName => {
                const card = document.createElement('div');
                card.className = 'category-card bg-white rounded-2xl p-6 text-center cursor-pointer hover:bg-gray-50 active:bg-gray-100 transition-all border-2 border-gray-200 shadow-sm';
                card.innerHTML = `
                    <h3 class="font-bold text-gray-800 text-base leading-snug">${categoryName}</h3>
                `;
                card.addEventListener('click', () => showCategory(categoryName));
                categoriesGrid.appendChild(card);
            });
        }

        // Función para mostrar una categoría específica
        function showCategory(categoryName) {
            currentCategory = categoryName;
            const category = menuData[categoryName];
            
            // Actualizar título y subtítulo
            categoryTitle.textContent = categoryName;
            categorySubtitle.textContent = category.subtitle;
            
            // Renderizar items
            itemsList.innerHTML = '';
            category.items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'border-b border-gray-100 pb-4';
                
                const hasPrice = item.price && item.price.trim() !== '';
                
                itemDiv.innerHTML = `
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-base mb-1">${item.name}</h4>
                            ${item.description ? `<p class="text-sm text-gray-500 leading-relaxed">${item.description}</p>` : ''}
                        </div>
                        ${hasPrice ? `<div class="font-bold text-gray-800 text-base whitespace-nowrap">${item.price}</div>` : ''}
                    </div>
                `;
                itemsList.appendChild(itemDiv);
            });
            
            // Cambiar de vista
            homeView.classList.remove('active');
            categoryView.classList.add('active');
            window.scrollTo(0, 0);
        }

        // Función para volver a la vista principal
        function showHome() {
            categoryView.classList.remove('active');
            homeView.classList.add('active');
            window.scrollTo(0, 0);
        }

        // Event listener para el botón volver
        backButton.addEventListener('click', showHome);

        // Inicializar la app
        renderCategories();
    </script>
